<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Feliz Cumpleaños 💖</title>

<style>
body{
    margin:0;
    font-family: 'Arial';
    background:#e7c7bb;
    overflow-x:hidden;
}

/* 🎉 Confetti */
.confetti{
    position:fixed;
    width:8px;
    height:8px;
    background:red;
    top:-10px;
    animation: caer linear infinite;
}

@keyframes caer{
    to{
        transform: translateY(100vh) rotate(360deg);
    }
}

/* 🎀 Contenedor */
.container{
    text-align:center;
    padding:20px;
}

/* ✨ Texto neón animado */
.neon{
    font-size:60px;
    font-weight:bold;
    animation: glow 1.5s infinite alternate;
}

@keyframes glow{
    from{
        color:#000;
        text-shadow: 0 0 5px #ff4da6, 0 0 10px #ff4da6;
    }
    to{
        color:#ff1493;
        text-shadow: 0 0 20px #ff1493, 0 0 40px #ff69b4;
    }
}

/* 🖼️ Imagen principal */
.main-img{
    width:300px;
    border-radius:10px;
    margin:20px 0;
}

/* 💌 Texto */
.texto{
    color:#ff2f6d;
    font-size:20px;
    padding:20px;
}

/* 🎈 Globos */
.balloon{
    position:fixed;
    bottom:-100px;
    width:40px;
    height:60px;
    background:pink;
    border-radius:50%;
    animation: subir 8s infinite;
}

@keyframes subir{
    to{
        transform: translateY(-120vh);
    }
}

</style>
</head>

<body>

<div class="container">

<h1 class="neon">🎉 Feliz Cumpleaños 🎀</h1>

<img src="foto_principal.jpg" class="main-img">

<div class="texto">
Que en este día tan tuyo, la vida te abrace con la calidez de quienes amas,  
que las estrellas iluminen tu camino con más fuerza que nunca  
y que tu alegría siempre sea más grande que cualquier sombra.  

<br><br>
Feliz día, Zulmarie ✨
</div>

</div>

<script>

/* 🎉 Generar confetti */
for(let i=0;i<50;i++){
    let conf = document.createElement("div");
    conf.className="confetti";
    conf.style.left=Math.random()*100+"vw";
    conf.style.animationDuration=(Math.random()*3+2)+"s";
    conf.style.background=["#ff4d6d","#ff85a1","#ffc2d1","#ffe5ec"][Math.floor(Math.random()*4)];
    document.body.appendChild(conf);
}

/* 🎈 Generar globos */
for(let i=0;i<10;i++){
    let b=document.createElement("div");
    b.className="balloon";
    b.style.left=Math.random()*100+"vw";
    b.style.background=["#ff4d6d","#ff85a1","#ffc2d1"][Math.floor(Math.random()*3)];
    b.style.animationDuration=(Math.random()*5+5)+"s";
    document.body.appendChild(b);
}

</script>

</body>
</html>
