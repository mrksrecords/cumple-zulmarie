<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Feliz Cumpleaños 💖</title>

<style>
body{
    margin:0;
    overflow:hidden;
}

/* 🖼️ FONDO = TU TARJETA */
.fondo{
    position:fixed;
    width:100%;
    height:100%;
    object-fit:cover;
}

/* 💕 Corazones */
.heart{
    position:fixed;
    bottom:-20px;
    font-size:20px;
    animation: subir linear forwards;
}

@keyframes subir{
    to{
        transform: translateY(-110vh);
        opacity:0;
    }
}

/* 🎉 CLICK invisible sobre el título */
.click-area{
    position:absolute;
    top:5%;
    left:20%;
    width:60%;
    height:120px;
    cursor:pointer;
}

</style>
</head>

<body>

<!-- TU IMAGEN COMPLETA -->
<img src="tarjeta.png" class="fondo">

<!-- zona clickeable -->
<div class="click-area" onclick="explosion()"></div>

<script>

/* corazones automáticos */
function crearCorazon(){
    let heart=document.createElement("div");
    heart.className="heart";
    heart.innerHTML="💖";
    heart.style.left=Math.random()*100+"vw";
    heart.style.fontSize=(Math.random()*20+15)+"px";
    heart.style.animationDuration=(Math.random()*3+3)+"s";
    document.body.appendChild(heart);

    setTimeout(()=>heart.remove(),5000);
}
setInterval(crearCorazon,300);

/* explosión */
function explosion(){
    for(let i=0;i<40;i++){
        let heart=document.createElement("div");
        heart.className="heart";
        heart.innerHTML="💗";
        heart.style.left=Math.random()*100+"vw";
        heart.style.fontSize=(Math.random()*25+20)+"px";
        heart.style.animationDuration=(Math.random()*2+2)+"s";
        document.body.appendChild(heart);

        setTimeout(()=>heart.remove(),4000);
    }
}

</script>

</body>
</html>
